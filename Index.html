<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyHigh Ticket Generator</title>
    <style>
        :root { --brand-color: #1a73e8; --text-main: #202124; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; color: var(--text-main); }
        
        .controls { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 40px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; width: 100%; max-width: 800px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        label { font-size: 12px; font-weight: bold; color: #5f6368; margin-bottom: -10px; }
        
        /* Ticket Container */
        .ticket { width: 850px; height: 280px; background: white; display: flex; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.15); position: relative; border: 1px solid #e0e0e0; }
        
        /* Dynamic Class Colors */
        .ticket.economy { border-top: 10px solid #1a73e8; }
        .ticket.business { border-top: 10px solid #673ab7; }
        .ticket.first { border-top: 10px solid #ff9800; }

        .main-section { flex: 2.5; padding: 25px; border-right: 2px dashed #ddd; position: relative; }
        .stub-section { flex: 1; padding: 25px; background: #fafafa; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* Elements */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .airline-info { font-weight: 900; font-size: 22px; letter-spacing: -1px; text-transform: uppercase; }
        .class-badge { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; color: white; background: var(--brand-color); }

        .route { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .airport-code { font-size: 42px; font-weight: 800; line-height: 1; }
        .plane-icon { font-size: 24px; color: #ccc; }

        .details-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .label { font-size: 9px; color: #80868b; text-transform: uppercase; margin-bottom: 3px; letter-spacing: 0.5px; }
        .value { font-size: 15px; font-weight: 700; text-transform: uppercase; }

        .barcode-area { margin-top: 25px; height: 50px; width: 100%; background: url('https://www.cognex.com/api/Sitecore/Barcode/Get?type=Code128&data=SKY-7782910&width=600&height=100&download=true'); background-size: cover; opacity: 0.8; }
        
        .pnr-code { position: absolute; top: 25px; right: 25px; font-family: monospace; font-size: 12px; color: #9aa0a6; }

        @media print { .controls { display: none; } body { background: white; padding: 0; } .ticket { box-shadow: none; margin: 0; } }
    </style>
</head>
<body>

    <div class="controls">
        <div style="display:contents">
            <label>Full Name</label><input type="text" id="in-name" placeholder="E.g. JASON BOURNE" oninput="update()">
            <label>From (Airport)</label><input type="text" id="in-from" placeholder="E.g. LONDON LHR" oninput="update()">
            <label>To (Airport)</label><input type="text" id="in-to" placeholder="E.g. TOKYO HND" oninput="update()">
            <label>Flight No.</label><input type="text" id="in-flight" placeholder="E.g. BA213" oninput="update()">
            <label>Seat</label><input type="text" id="in-seat" placeholder="E.g. 12C" oninput="update()">
            <label>Travel Class</label>
            <select id="in-class" onchange="update()">
                <option value="economy">Economy</option>
                <option value="business">Business Class</option>
                <option value="first">First Class</option>
            </select>
        </div>
        <button onclick="window.print()" style="grid-column: span 2; margin-top:10px; padding: 12px; background: #202124; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">Generate & Print PDF</button>
    </div>

    <div class="ticket economy" id="tkt">
        <div class="main-section">
            <div class="pnr-code">PNR: <span id="out-pnr">XJ92KL</span></div>
            <div class="header">
                <div class="airline-info" id="out-airline">SkyHigh International</div>
                <div class="class-badge" id="out-badge">Economy</div>
            </div>

            <div class="route">
                <div>
                    <div class="label">Origin</div>
                    <div class="airport-code" id="out-from">LHR</div>
                </div>
                <div class="plane-icon">✈</div>
                <div style="text-align: right;">
                    <div class="label">Destination</div>
                    <div class="airport-code" id="out-to">HND</div>
                </div>
            </div>

            <div class="details-grid">
                <div><div class="label">Passenger</div><div class="value" id="out-name">PASSENGER NAME</div></div>
                <div><div class="label">Flight</div><div class="value" id="out-flight">SH101</div></div>
                <div><div class="label">Gate</div><div class="value">B22</div></div>
                <div><div class="label">Boarding</div><div class="value">14:20</div></div>
            </div>
            
            <div class="barcode-area"></div>
        </div>

        <div class="stub-section">
            <div class="label">Boarding Pass</div>
            <div>
                <div class="label">Passenger</div>
                <div class="value" id="out-name-stub" style="font-size: 13px;">NAME</div>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <div><div class="label">Seat</div><div class="value" id="out-seat" style="font-size: 28px;">--</div></div>
                <div><div class="label">Group</div><div class="value" style="font-size: 28px;">A</div></div>
            </div>
            <div class="barcode-area" style="height: 30px;"></div>
        </div>
    </div>

    <script>
        // Generate a random PNR on load
        document.getElementById('out-pnr').innerText = Math.random().toString(36).substring(2, 8).toUpperCase();

        function update() {
            const name = document.getElementById('in-name').value || "PASSENGER NAME";
            const from = document.getElementById('in-from').value || "LHR";
            const to = document.getElementById('in-to').value || "HND";
            const flight = document.getElementById('in-flight').value || "SH101";
            const seat = document.getElementById('in-seat').value || "--";
            const tClass = document.getElementById('in-class').value;

            // Update Text
            document.getElementById('out-name').innerText = name.toUpperCase();
            document.getElementById('out-name-stub').innerText = name.toUpperCase();
            document.getElementById('out-from').innerText = from.toUpperCase().substring(0, 3);
            document.getElementById('out-to').innerText = to.toUpperCase().substring(0, 3);
            document.getElementById('out-flight').innerText = flight.toUpperCase();
            document.getElementById('out-seat').innerText = seat.toUpperCase();
            document.getElementById('out-badge').innerText = tClass;

            // Update Visual Class
            const tkt = document.getElementById('tkt');
            tkt.className = "ticket " + tClass;
            
            // Set dynamic badge color
            const colors = { economy: '#1a73e8', business: '#673ab7', first: '#ff9800' };
            document.getElementById('out-badge').style.background = colors[tClass];
        }
    </script>
</body>
</html>
