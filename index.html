<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviation Systems | Boarding Pass</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Barcode+128&family=Roboto+Mono:wght@400;700&display=swap');

        body { background: #333; font-family: 'Roboto Mono', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* UI Controls - Hidden on Print */
        .ui-panel { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 40px; width: 100%; max-width: 900px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        input, select { padding: 8px; border: 1px solid #ccc; font-family: sans-serif; }
        .print-btn { grid-column: 1/-1; background: #007bff; color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; }

        /* THE TICKET - Real Life Specs */
        .boarding-pass { 
            width: 8.5in; height: 3.2in; background: #fff; color: #000; 
            display: flex; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px; overflow: hidden;
        }

        .main-body { flex: 2.3; padding: 25px; border-right: 1.5px dashed #999; position: relative; }
        .stub-body { flex: 1; padding: 25px; background: #fff; }

        /* Branding & Header */
        .airline-header { font-size: 20px; font-weight: 700; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .pnr-box { font-size: 14px; }

        /* Route Display */
        .route-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .city-box { display: flex; flex-direction: column; }
        .city-code { font-size: 55px; font-weight: 700; line-height: 1; }
        .city-name { font-size: 10px; text-transform: uppercase; margin-top: 5px; }
        .plane-icon { font-size: 30px; color: #000; }

        /* Data Grid */
        .data-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .label { font-size: 10px; font-weight: 400; color: #555; text-transform: uppercase; margin-bottom: 2px; }
        .value { font-size: 16px; font-weight: 700; text-transform: uppercase; }

        /* Barcode Logic */
        .barcode { font-family: 'Libre Barcode 128', cursive; font-size: 60px; line-height: 1; margin-top: 20px; }
        .small-barcode { font-family: 'Libre Barcode 128', cursive; font-size: 40px; margin-top: 10px; }

        /* Stub Details */
        .stub-header { font-size: 12px; font-weight: 700; margin-bottom: 20px; text-align: center; border: 1px solid #000; padding: 2px; }
        .stub-row { margin-bottom: 15px; }

        @media print {
            .ui-panel { display: none; }
            body { background: #fff; padding: 0; }
            .boarding-pass { box-shadow: none; border: 1px solid #eee; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <input type="text" id="in-airline" placeholder="Airline (e.g. EMIRATES)" oninput="upd()">
        <input type="text" id="in-name" placeholder="Passenger Name" oninput="upd()">
        <input type="text" id="in-from" placeholder="From (Code)" maxlength="3" oninput="upd()">
        <input type="text" id="in-to" placeholder="To (Code)" maxlength="3" oninput="upd()">
        <input type="text" id="in-flight" placeholder="Flight No." oninput="upd()">
        <input type="text" id="in-gate" placeholder="Gate" oninput="upd()">
        <input type="text" id="in-seat" placeholder="Seat" oninput="upd()">
        <input type="time" id="in-time" oninput="upd()">
        <button class="print-btn" onclick="window.print()">PRINT / DOWNLOAD PDF</button>
    </div>

    <div class="boarding-pass">
        <div class="main-body">
            <div class="airline-header">
                <span id="out-airline">GLOBAL REACH AIRWAYS</span>
                <span class="pnr-box">PNR: <b id="out-pnr"></b></span>
            </div>

            <div class="route-container">
                <div class="city-box">
                    <span class="city-code" id="out-from">JFK</span>
                    <span class="city-name">NEW YORK</span>
                </div>
                <div class="plane-icon">✈</div>
                <div class="city-box" style="text-align: right;">
                    <span class="city-code" id="out-to">LHR</span>
                    <span class="city-name">LONDON</span>
                </div>
            </div>

            <div class="data-row">
                <div><div class="label">Passenger Name</div><div class="value" id="out-name">CLINTON GOMEZ</div></div>
                <div><div class="label">Flight</div><div class="value" id="out-flight">FW193</div></div>
                <div><div class="label">Gate</div><div class="value" id="out-gate">A91</div></div>
                <div><div class="label">Boarding</div><div class="value" id="out-time">19:29</div></div>
            </div>

            <div class="barcode" id="out-barcode">CLINTON193JFK</div>
        </div>

        <div class="stub-body">
            <div class="stub-header">BOARDING PASS</div>
            <div class="stub-row">
                <div class="label">Passenger</div>
                <div class="value" id="out-name-s" style="font-size: 13px;">CLINTON GOMEZ</div>
            </div>
            <div class="stub-row" style="display:flex; justify-content:space-between">
                <div><div class="label">Seat</div><div class="value" id="out-seat" style="font-size: 35px;">16B</div></div>
                <div style="text-align:right"><div class="label">Group</div><div class="value" style="font-size: 35px;">A</div></div>
            </div>
            <div class="small-barcode">CLINTON193</div>
        </div>
    </div>

    <script>
        // Generate random PNR
        document.getElementById('out-pnr').innerText = Math.random().toString(36).substring(2, 7).toUpperCase();

        function upd() {
            const get = (id) => document.getElementById(id).value;
            const set = (id, val) => document.getElementById(id).innerText = val.toUpperCase() || '---';

            set('out-airline', get('in-airline') || 'GLOBAL REACH AIRWAYS');
            set('out-name', get('in-name'));
            set('out-name-s', get('in-name'));
            set('out-from', get('in-from'));
            set('out-to', get('in-to'));
            set('out-flight', get('in-flight'));
            set('out-gate', get('in-gate'));
            set('out-seat', get('in-seat'));
            set('out-time', get('in-time'));
            
            // Sync Barcode
            document.getElementById('out-barcode').innerText = (get('in-name') + get('in-flight')).substring(0, 15).toUpperCase();
        }
    </script>
</body>
</html>
