<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Deck | RP Ticket Generator</title>
    <style>
        :root { --blue: #1a73e8; --purple: #673ab7; --gold: #f2994a; --gray: #5f6368; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #202124; }
        
        /* Editor UI */
        .editor { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 800px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .editor h2 { grid-column: 1 / -1; margin-top: 0; font-size: 18px; color: var(--blue); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--gray); margin-bottom: 5px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--blue); }
        .btn-print { grid-column: 1 / -1; background: #202124; color: white; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-print:hover { background: #000; }

        /* Boarding Pass Styles */
        .ticket { width: 800px; height: 260px; background: white; border-radius: 16px; display: flex; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; position: relative; }
        .ticket::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: var(--blue); }
        .ticket.business::before { background: var(--purple); }
        .ticket.first::before { background: var(--gold); }

        .main { flex: 2.5; padding: 30px; border-right: 2px dashed #e0e0e0; position: relative; }
        .stub { flex: 1; padding: 30px; background: #fafafa; display: flex; flex-direction: column; justify-content: space-between; }

        .pnr { position: absolute; top: 30px; right: 30px; font-family: 'Courier New', monospace; font-size: 14px; color: #999; }
        .airline { font-weight: 900; font-size: 20px; text-transform: uppercase; margin-bottom: 30px; display: flex; align-items: center; gap: 8px; }
        
        .route-row { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        .airport-code { font-size: 48px; font-weight: 800; line-height: 1; letter-spacing: -2px; }
        .plane-path { flex-grow: 1; border-top: 2px dotted #ccc; position: relative; height: 1px; }
        .plane-path::after { content: "✈"; position: absolute; top: -12px; left: 50%; color: #ccc; }

        .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .inf { font-size: 9px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .val { font-size: 14px; font-weight: 700; text-transform: uppercase; }

        .barcode { margin-top: 25px; height: 40px; width: 100%; background: linear-gradient(90deg, #000 1%, #fff 1.5%, #000 2%, #fff 4%, #000 4.5%, #fff 5%, #000 7%, #fff 8%, #000 12%, #fff 13%, #000 15%, #fff 18%, #000 22%, #fff 23%, #000 28%, #fff 30%, #000 35%, #fff 38%, #000 45%, #fff 48%, #000 55%, #fff 60%, #000 70%, #fff 80%, #000 95%); opacity: 0.7; }

        @media print { .editor { display: none; } body { background: white; padding: 0; } .ticket { box-shadow: none; border: 1px solid #ddd; } }
    </style>
</head>
<body>

    <div class="editor">
        <h2>Ticket Customizer</h2>
        <div class="field"><label>Passenger Name</label><input type="text" id="in-name" placeholder="John Doe" oninput="upd()"></div>
        <div class="field"><label>Origin (3 Letters)</label><input type="text" id="in-from" maxlength="3" placeholder="JFK" oninput="upd()"></div>
        <div class="field"><label>Destination (3 Letters)</label><input type="text" id="in-to" maxlength="3" placeholder="LHR" oninput="upd()"></div>
        <div class="field"><label>Flight No</label><input type="text" id="in-flight" placeholder="AA123" oninput="upd()"></div>
        <div class="field"><label>Gate</label><input type="text" id="in-gate" placeholder="A12" oninput="upd()"></div>
        <div class="field"><label>Seat</label><input type="text" id="in-seat" placeholder="14B" oninput="upd()"></div>
        <div class="field"><label>Boarding Time</label><input type="time" id="in-time" oninput="upd()"></div>
        <div class="field"><label>Class</label>
            <select id="in-class" onchange="upd()">
                <option value="economy">Economy</option>
                <option value="business">Business</option>
                <option value="first">First Class</option>
            </select>
        </div>
        <button class="btn-print" onclick="window.print()">GENERATE PDF / PRINT</button>
    </div>

    <div class="ticket" id="tkt">
        <div class="main">
            <div class="pnr">REF: <span id="out-pnr">------</span></div>
            <div class="airline">✈ <span id="out-airline">GLOBAL REACH AIRWAYS</span></div>
            
            <div class="route-row">
                <div class="airport-code" id="out-from">JFK</div>
                <div class="plane-path"></div>
                <div class="airport-code" id="out-to">LHR</div>
            </div>

            <div class="info-grid">
                <div><div class="inf">Passenger</div><div class="val" id="out-name">PASSENGER</div></div>
                <div><div class="inf">Flight</div><div class="val" id="out-flight">--123</div></div>
                <div><div class="inf">Gate</div><div class="val" id="out-gate">--</div></div>
                <div><div class="inf">Boarding</div><div class="val" id="out-time">00:00</div></div>
            </div>
            <div class="barcode"></div>
        </div>
        <div class="stub">
            <div style="font-size: 10px; font-weight: bold; letter-spacing: 2px;">BOARDING PASS</div>
            <div>
                <div class="inf">Name</div>
                <div class="val" id="out-name-s" style="font-size: 12px;">PASSENGER</div>
            </div>
            <div>
                <div class="inf">Seat</div>
                <div class="val" id="out-seat" style="font-size: 28px;">--</div>
            </div>
            <div class="barcode" style="height: 30px; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        // Generate a random Booking Reference on load
        const pnr = Math.random().toString(36).substring(2, 8).toUpperCase();
        document.getElementById('out-pnr').innerText = pnr;

        function upd() {
            const get = (id) => document.getElementById(id).value;
            const set = (id, val) => document.getElementById(id).innerText = val.toUpperCase() || '---';

            set('out-name', get('in-name'));
            set('out-name-s', get('in-name'));
            set('out-from', get('in-from'));
            set('out-to', get('in-to'));
            set('out-flight', get('in-flight'));
            set('out-gate', get('in-gate'));
            set('out-seat', get('in-seat'));
            set('out-time', get('in-time'));

            const cls = document.getElementById('in-class').value;
            document.getElementById('tkt').className = 'ticket ' + cls;
        }

        // Set default time to now
        const now = new Date();
        document.getElementById('in-time').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        upd();
    </script>
</body>
</html>
